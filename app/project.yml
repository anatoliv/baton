name: Baton

options:
  bundleIdPrefix: io.tonebox
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Q8822GNL2H"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Warnings-as-errors is deliberately OFF for the Wave-1 lift; re-enable once the
    # standalone build is green (the lifted code was warnings-clean in Tonebox).
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES

targets:
  Baton:
    type: application
    platform: macOS
    sources:
      - path: Sources/Baton
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tonebox.baton
        PRODUCT_NAME: Baton
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # A physical Info.plist is generated from `info:` below (instead of the
        # build-setting generator) so the nested App Transport Security dict can be
        # expressed — INFOPLIST_KEY_* only supports flat keys.
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Baton
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.music"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "by Tonebox"
        NSHighResolutionCapable: true
        # Internet-radio stations are overwhelmingly plain-HTTP Shoutcast/Icecast
        # streams; default ATS blocks them, so AVPlayer shows "On air" but never
        # starts (silent). This scopes the exception to AVFoundation media only —
        # it does NOT open up arbitrary NSURLSession HTTP.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true
    entitlements:
      path: Baton.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  BatonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/BatonTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Baton.app/Contents/MacOS/Baton
    dependencies:
      - target: Baton

schemes:
  Baton:
    build:
      targets:
        Baton: all
        BatonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BatonTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
