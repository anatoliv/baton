name: Baton

options:
  bundleIdPrefix: io.tonebox
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

packages:
  # Renders the bundled HELP.md / FAQ.md guides in the in-app Help window.
  # Same library and pin Tonebox uses, so the Markdown theming matches.
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    exactVersion: "2.4.1"
  # Opt-in remote crash & error reporting. Dormant unless the user enables
  # it (Settings, About → Diagnostics, default OFF) AND a DSN is baked into
  # the build via Config/Sentry.local.xcconfig (gitignored). See CrashReporting.
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    # Pinned to the tested minor (W-17): the W-10 privacy hardening depends on
    # sentry-cocoa's 8.58.x auto-instrumentation option names/defaults.
    exactVersion: "8.58.4"
  # Auto-update. Same framework and pin Tonebox uses. The appcast feed +
  # EdDSA public key are set in the Info.plist below; SUEnableAutomaticChecks
  # is the "the feed is actually live" switch. See SparkleUpdater / UpdateChannel
  # and docs/RELEASE-APPCAST-HOSTING.md.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.4" # pinned to the tested version (W-17)
  # Local module: the pure equalizer DSP, first leaf of the W-51 module-boundary split.
  BatonDSP:
    path: ../Packages/BatonDSP
  # Local module: the Subsonic/Navidrome domain value types, second leaf of the W-51 split.
  BatonSubsonicModels:
    path: ../Packages/BatonSubsonicModels
  # Local module: the TTS config + synthesis layer, third leaf of the W-51 split.
  BatonSpeech:
    path: ../Packages/BatonSpeech
  # Local module: the MCP transport protocol (JSON-RPC, HTTP parse/frame, auth), fourth leaf.
  BatonMCPProtocol:
    path: ../Packages/BatonMCPProtocol

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Q8822GNL2H"
    MARKETING_VERSION: "0.7.3"
    CURRENT_PROJECT_VERSION: "19"
    # Warnings-as-errors is deliberately OFF for the Wave-1 lift; re-enable once the
    # standalone build is green (the lifted code was warnings-clean in Tonebox).
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES

targets:
  Baton:
    type: application
    platform: macOS
    dependencies:
      - package: MarkdownUI
      - package: Sentry
      - package: Sparkle
      - package: BatonDSP
      - package: BatonSubsonicModels
      - package: BatonSpeech
      - package: BatonMCPProtocol
    # Feeds the SENTRY_DSN build setting (and thus the SentryDSN Info.plist
    # key). The committed Config/Sentry.xcconfig defaults SENTRY_DSN to empty
    # and optionally #include?s Config/Sentry.local.xcconfig (gitignored),
    # where the real DSN lives. See CrashReporting.
    configFiles:
      Debug: Config/Sentry.xcconfig
      Release: Config/Sentry.xcconfig
    # Keep the app-bundled copies of the user guides in step with the
    # canonical HELP.md / FAQ.md at the repo root on every build, so the
    # in-app Help window never drifts from the docs we edit.
    preBuildScripts:
      - name: Sync Help guides
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cp "$SRCROOT/../HELP.md" "$SRCROOT/Sources/Baton/Resources/HELP.md"
          cp "$SRCROOT/../FAQ.md"  "$SRCROOT/Sources/Baton/Resources/FAQ.md"
    sources:
      - path: Sources/Baton
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tonebox.baton
        PRODUCT_NAME: Baton
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # A physical Info.plist is generated from `info:` below (instead of the
        # build-setting generator) so the nested App Transport Security dict can be
        # expressed — INFOPLIST_KEY_* only supports flat keys.
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        # Localization groundwork (W-64): adopt a String Catalog and let the compiler extract
        # SwiftUI `Text("…")` strings into it, so the whole UI is localizable when target locales
        # are chosen — no per-string wrapping needed. English is the development/source language.
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Baton
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.music"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "by Tonebox"
        NSHighResolutionCapable: true
        # Internet-radio stations are overwhelmingly plain-HTTP Shoutcast/Icecast
        # streams; default ATS blocks them, so AVPlayer shows "On air" but never
        # starts (silent). This scopes the exception to AVFoundation media only —
        # it does NOT open up arbitrary NSURLSession HTTP.
        # `NSAllowsLocalNetworking` additionally permits cleartext NSURLSession to
        # local hosts (*.local and RFC-1918 LAN IPs) — needed for the self-hosted
        # TTS services the `speak_summary` tool POSTs to — without opening cleartext
        # to the public internet.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true
          NSAllowsLocalNetworking: true
        # macOS gates LAN access behind a privacy prompt; this is its description. Needed
        # because the `speak_summary` tool reaches self-hosted TTS services on the LAN.
        NSLocalNetworkUsageDescription: "Baton connects to your self-hosted text-to-speech services on your local network to speak task summaries aloud."
        # Sentry DSN, substituted from the SENTRY_DSN build setting
        # (Config/Sentry.xcconfig → optional gitignored Config/Sentry.local.xcconfig).
        # Empty in repo builds, so remote reporting stays disabled even if the
        # user opts in. See CrashReporting.
        SentryDSN: "$(SENTRY_DSN)"
        # Sparkle auto-update. The appcast is served from Baton's own site.
        # SUEnableAutomaticChecks is the "the feed is actually live" switch:
        # it flips to true once a real EdDSA key is generated and the appcast
        # is hosted (see docs/RELEASE-APPCAST-HOSTING.md). Until then the
        # in-app UI shows "Not available yet" and the check is disabled.
        # See SparkleUpdater / UpdateChannel.
        SUFeedURL: "https://baton.tonebox.io/appcast.xml"
        SUEnableAutomaticChecks: true
        # Shared EdDSA public key (the private key lives in the login Keychain;
        # Sparkle recommends one key across all your apps). Public, safe to commit.
        SUPublicEDKey: "pDgN5Ibe6Q9QY5cxRpXmXLm/S2lBGbVLy/eBVEW1nTo="
    entitlements:
      path: Baton.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  BatonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/BatonTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Baton.app/Contents/MacOS/Baton
    dependencies:
      - target: Baton
      - package: Sentry # W-10: CrashReportingScrubberTests builds synthetic Sentry events

  # W-48: launch/smoke UI tests. Deliberately kept OUT of the `Baton` scheme's test action below,
  # so the headless `scripts/test.sh` gate (which runs `-scheme Baton`) never tries to launch a UI
  # session it can't. Run explicitly with `-scheme BatonUITests` on a machine with a GUI + signed app.
  BatonUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/BatonUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Baton
    dependencies:
      - target: Baton

schemes:
  BatonUITests:
    build:
      targets:
        BatonUITests: [test]
    test:
      config: Debug
      targets:
        - BatonUITests
  Baton:
  Baton:
    build:
      targets:
        Baton: all
        BatonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BatonTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
