name: Baton

options:
  bundleIdPrefix: io.tonebox
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

packages:
  # Renders the bundled HELP.md / FAQ.md guides in the in-app Help window.
  # Same library and pin Tonebox uses, so the Markdown theming matches.
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  # Opt-in remote crash & error reporting. Dormant unless the user enables
  # it (Settings, About → Diagnostics, default OFF) AND a DSN is baked into
  # the build via Config/Sentry.local.xcconfig (gitignored). See CrashReporting.
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Q8822GNL2H"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Warnings-as-errors is deliberately OFF for the Wave-1 lift; re-enable once the
    # standalone build is green (the lifted code was warnings-clean in Tonebox).
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES

targets:
  Baton:
    type: application
    platform: macOS
    dependencies:
      - package: MarkdownUI
      - package: Sentry
    # Feeds the SENTRY_DSN build setting (and thus the SentryDSN Info.plist
    # key). The committed Config/Sentry.xcconfig defaults SENTRY_DSN to empty
    # and optionally #include?s Config/Sentry.local.xcconfig (gitignored),
    # where the real DSN lives. See CrashReporting.
    configFiles:
      Debug: Config/Sentry.xcconfig
      Release: Config/Sentry.xcconfig
    # Keep the app-bundled copies of the user guides in step with the
    # canonical HELP.md / FAQ.md at the repo root on every build, so the
    # in-app Help window never drifts from the docs we edit.
    preBuildScripts:
      - name: Sync Help guides
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cp "$SRCROOT/../HELP.md" "$SRCROOT/Sources/Baton/Resources/HELP.md"
          cp "$SRCROOT/../FAQ.md"  "$SRCROOT/Sources/Baton/Resources/FAQ.md"
    sources:
      - path: Sources/Baton
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tonebox.baton
        PRODUCT_NAME: Baton
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # A physical Info.plist is generated from `info:` below (instead of the
        # build-setting generator) so the nested App Transport Security dict can be
        # expressed — INFOPLIST_KEY_* only supports flat keys.
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Baton
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.music"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "by Tonebox"
        NSHighResolutionCapable: true
        # Internet-radio stations are overwhelmingly plain-HTTP Shoutcast/Icecast
        # streams; default ATS blocks them, so AVPlayer shows "On air" but never
        # starts (silent). This scopes the exception to AVFoundation media only —
        # it does NOT open up arbitrary NSURLSession HTTP.
        # `NSAllowsLocalNetworking` additionally permits cleartext NSURLSession to
        # local hosts (*.local and RFC-1918 LAN IPs) — needed for the self-hosted
        # TTS services the `speak_summary` tool POSTs to — without opening cleartext
        # to the public internet.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true
          NSAllowsLocalNetworking: true
        # macOS gates LAN access behind a privacy prompt; this is its description. Needed
        # because the `speak_summary` tool reaches self-hosted TTS services on the LAN.
        NSLocalNetworkUsageDescription: "Baton connects to your self-hosted text-to-speech services on your local network to speak task summaries aloud."
        # Sentry DSN, substituted from the SENTRY_DSN build setting
        # (Config/Sentry.xcconfig → optional gitignored Config/Sentry.local.xcconfig).
        # Empty in repo builds, so remote reporting stays disabled even if the
        # user opts in. See CrashReporting.
        SentryDSN: "$(SENTRY_DSN)"
    entitlements:
      path: Baton.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  BatonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/BatonTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Baton.app/Contents/MacOS/Baton
    dependencies:
      - target: Baton

schemes:
  Baton:
    build:
      targets:
        Baton: all
        BatonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BatonTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
