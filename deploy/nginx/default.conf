# baton_web — static site server. TLS is terminated upstream at Nginx Proxy
# Manager; this only ever sees plain HTTP on the internal proxy_net.
server {
    listen 80;
    server_name baton.tonebox.io;

    root  /usr/share/nginx/html;
    index index.html;

    # Branded 404. try_files' `=404` below (and any missing file) renders this
    # styled page instead of nginx's bare default, while keeping the 404 status.
    error_page 404 /404.html;
    location = /404.html { internal; add_header Cache-Control "no-cache" always; }

    # Compress text assets on the fly.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/rss+xml;

    # Baseline security headers (the site is fully self-contained: no external
    # scripts, styles, fonts, or images).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTML: always revalidate so redeploys show up immediately (files aren't
    # content-hashed).
    location = / { try_files /index.html =404; add_header Cache-Control "no-cache" always; }
    location ~* \.html$ { add_header Cache-Control "no-cache" always; }

    # Static assets: short cache (also un-fingerprinted, so keep it modest).
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
