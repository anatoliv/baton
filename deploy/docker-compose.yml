# baton.tonebox.io — static marketing + docs site on web-01.
#
# Mirrors the tonebox-appcast hosting design: a tiny nginx:alpine container
# that serves ./site read-only, joined to the shared external `proxy_net` so
# Nginx Proxy Manager can route  baton.tonebox.io → baton_web:80.
# Publishes NO host ports — NPM is the only ingress on this box.
#
# Deploy dir on web-01:  /opt/docker/baton-web
#   ./site/               the static site (index.html, help.html, styles.css,
#                         main.js, og.png, apple-touch-icon.png)
#   ./nginx/default.conf  server config
#
# Bring up (from /opt/docker/baton-web):  docker compose up -d
# The scripts/publish-site.sh helper syncs the files and does this for you.

services:
  web:
    image: nginx:1.27-alpine
    container_name: baton_web
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
