<!-- Baton STATIC app icon master — floating waveform mark with a music note riding the top crest, on transparency (Finder/Launchpad). Sibling of Tonebox (same three faded #E07A4B waves, same weight/proportion). Regenerate appiconset PNGs via generate-app-icons.sh / rsvg-convert. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Three stacked waves — identical DNA to Tonebox (stroke #E07A4B, width 71.76, round caps, opacity 1.0 / 0.82 / 0.64). Shifted down 44px vs Tonebox to make headroom for the note while keeping the mark visually centered. -->
  <path d="M 180.80 372.00 Q 328.00 261.60 512.00 372.00 T 843.20 372.00" stroke="#E07A4B" stroke-width="71.76" stroke-linecap="round" fill="none" opacity="1.0"/>
  <path d="M 180.80 556.00 Q 328.00 445.60 512.00 556.00 T 843.20 556.00" stroke="#E07A4B" stroke-width="71.76" stroke-linecap="round" fill="none" opacity="0.82"/>
  <path d="M 180.80 740.00 Q 328.00 850.40 512.00 740.00 T 843.20 740.00" stroke="#E07A4B" stroke-width="71.76" stroke-linecap="round" fill="none" opacity="0.64"/>

  <!-- Music note standing on the top crest (crest peak x≈328, y≈287). Notehead sits just above the wave with a clean gap so it reads distinctly; the stem rises and the flag sweeps right, echoing the wave's motion. Full opacity — the primary "this is music" signal. -->
  <g stroke="none" fill="#E07A4B" opacity="1.0">
    <!-- Stem -->
    <path d="M 358.00 246.00 h 40.00 v -158.00 h -40.00 z"/>
    <!-- Flag: single wave-like sweep off the top of the stem, matching the waveform curvature. -->
    <path d="M 398.00 88.00 Q 506.00 100.00 506.00 190.00 Q 506.00 236.00 458.00 250.00 Q 496.00 206.00 466.00 168.00 Q 438.00 132.00 398.00 148.00 z"/>
    <!-- Notehead: tilted filled ellipse resting just above the top crest. -->
    <g transform="translate(322.00 244.00) rotate(-24)">
      <ellipse cx="0" cy="0" rx="70.00" ry="52.00"/>
    </g>
  </g>
</svg>
