<!-- Baton 16pt SIMPLIFIED variant on the DARK plate — two thicker waves + compact note in #E07A4B, on the near-black rounded plate (matches Baton-dock-dark.svg / Tonebox dark). Used by generate-app-icons.sh for the icon_16x16 slots so tiny sizes stay on-brand instead of floating plate-less. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="plateDark16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1C1E"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
  </defs>
  <rect x="104" y="104" width="816" height="816" rx="184" ry="184" fill="url(#plateDark16)" stroke="#2A2A2E" stroke-width="2"/>

  <!-- Mark, scaled/centered inside the plate (0.72 scale, centered) — same treatment as the full dark dock icon. -->
  <g transform="translate(512 512) scale(0.72) translate(-512 -512)">
    <path d="M 150.00 560.00 Q 330.00 430.00 512.00 560.00 T 874.00 560.00" stroke="#E07A4B" stroke-width="104.00" stroke-linecap="round" fill="none" opacity="1.0"/>
    <path d="M 150.00 792.00 Q 330.00 922.00 512.00 792.00 T 874.00 792.00" stroke="#E07A4B" stroke-width="104.00" stroke-linecap="round" fill="none" opacity="0.7"/>
    <g stroke="none" fill="#E07A4B" opacity="1.0">
      <path d="M 360.00 400.00 h 60.00 v -252.00 h -60.00 z"/>
      <path d="M 420.00 148.00 Q 560.00 164.00 560.00 300.00 Q 560.00 356.00 500.00 372.00 Q 548.00 316.00 512.00 264.00 Q 476.00 214.00 420.00 236.00 z"/>
      <g transform="translate(316.00 396.00) rotate(-22)"><ellipse cx="0" cy="0" rx="104.00" ry="80.00"/></g>
    </g>
  </g>
</svg>
