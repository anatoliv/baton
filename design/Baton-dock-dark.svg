  <defs>
    <linearGradient id="plateDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1C1E"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
  </defs>
  <rect x="104" y="104" width="816" height="816" rx="184" ry="184" fill="url(#plateDark)" stroke="#2A2A2E" stroke-width="2"/>

  <g transform="translate(512 512) scale(0.72) translate(-512 -512)">
