<!-- Baton dock icon — DARK. Rounded-rect plate in near-black with a subtle vertical gradient (matches the Tonebox dark dock), with the Baton mark (waveform + note) in #E07A4B centered on it. The lower waves' opacity fade lets them brown out against the dark plate, exactly like Tonebox. -->
